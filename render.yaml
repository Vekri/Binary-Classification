services:
  - type: web
    name: binary-classification-ml
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/main.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: STREAMLIT_SERVER_MAX_UPLOAD_SIZE
        value: "200"
    healthCheckPath: /_stcore/health
